name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
      draft:
        description: "Create release as draft"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  release:
    name: Build, Package, and Publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create CI xcconfig
        run: |
          printf 'GOOGLE_CLIENT_ID =\nGOOGLE_CLIENT_SECRET =\n' > Secrets.xcconfig

      - name: Detect signing secrets
        id: signing
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE_P12" \
             && -n "$MACOS_CERTIFICATE_PASSWORD" \
             && -n "$KEYCHAIN_PASSWORD" \
             && -n "$DEVELOPMENT_TEAM" \
             && -n "$DEVELOPER_ID_APPLICATION" \
             && -n "$APPLE_ID" \
             && -n "$APPLE_TEAM_ID" \
             && -n "$APP_SPECIFIC_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing/notarization secrets are incomplete; publishing unsigned/ad-hoc artifacts."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          : "${MACOS_CERTIFICATE_P12:?MACOS_CERTIFICATE_P12 secret is required}"
          : "${MACOS_CERTIFICATE_PASSWORD:?MACOS_CERTIFICATE_PASSWORD secret is required}"
          : "${KEYCHAIN_PASSWORD:?KEYCHAIN_PASSWORD secret is required}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -p codesigning -v

      - name: Test
        run: xcodebuild -scheme DriveDock -configuration Debug test

      - name: Package app
        env:
          SIGN_FOR_RELEASE: ${{ steps.signing.outputs.enabled == 'true' && '1' || '0' }}
          NOTARIZE: ${{ steps.signing.outputs.enabled == 'true' && '1' || '0' }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: scripts/package_release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DRAFT_FLAG=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.draft }}" == "true" ]]; then
            DRAFT_FLAG="--draft"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.dmg \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.dmg.sha256 \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.zip \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.zip.sha256 \
              --clobber
            gh release edit "$TAG" \
              --title "DriveDock $VERSION" \
              --notes-file build/release/artifacts/RELEASE_NOTES.md \
              $DRAFT_FLAG
          else
            gh release create "$TAG" \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.dmg \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.dmg.sha256 \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.zip \
              build/release/artifacts/DriveDock-"$VERSION"-macOS.zip.sha256 \
              --title "DriveDock $VERSION" \
              --notes-file build/release/artifacts/RELEASE_NOTES.md \
              --target "$GITHUB_SHA" \
              $DRAFT_FLAG
          fi
