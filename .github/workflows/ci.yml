name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI xcconfig
        run: |
          printf 'GOOGLE_CLIENT_ID =\nGOOGLE_CLIENT_SECRET =\n' > Secrets.xcconfig

      - name: Build
        run: xcodebuild -scheme DriveDock -configuration Debug build

      - name: Test
        run: xcodebuild -scheme DriveDock -configuration Debug test
